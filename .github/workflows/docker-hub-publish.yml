name: Build and Publish to Docker Hub

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Docker image tag (e.g. 0.6.2-esp32-multinode)'
        required: true
        default: '0.6.2-esp32-multinode'
        type: string
      push_latest:
        description: 'Also tag as latest'
        required: false
        default: true
        type: boolean

env:
  DOCKERHUB_REPO: suzujun/wifi-densepose-multinode

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4.2.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0

      - name: Login to Docker Hub
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@263435318d21b8e681c14492fe198e19c3bc62d6 # v6.18.0
        with:
          context: .
          file: docker/Dockerfile.rust
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.DOCKERHUB_REPO }}:${{ inputs.image_tag }}
            ${{ inputs.push_latest && format('{0}:latest', env.DOCKERHUB_REPO) || '' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify image
        run: |
          docker pull ${{ env.DOCKERHUB_REPO }}:${{ inputs.image_tag }}
          docker run --rm --entrypoint="" ${{ env.DOCKERHUB_REPO }}:${{ inputs.image_tag }} /app/sensing-server --help

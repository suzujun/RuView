name: Build and Publish to Docker Hub

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Docker image tag (e.g. 0.6.2-esp32-multinode)'
        required: true
        default: '0.6.2-esp32-multinode'
        type: string
      push_latest:
        description: 'Also tag as latest'
        required: false
        default: true
        type: boolean

env:
  DOCKERHUB_REPO: suzujun/wifi-densepose-multinode

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Login to Docker Hub
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          file: docker/Dockerfile.rust
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.DOCKERHUB_REPO }}:${{ inputs.image_tag }}
            ${{ inputs.push_latest && format('{0}:latest', env.DOCKERHUB_REPO) || '' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify image
        run: |
          docker pull ${{ env.DOCKERHUB_REPO }}:${{ inputs.image_tag }}
          docker run --rm --entrypoint="" ${{ env.DOCKERHUB_REPO }}:${{ inputs.image_tag }} /app/sensing-server --help
